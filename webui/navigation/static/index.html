<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTR — Navigation</title>
<script src="/static/shared.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #ccc;
  font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
  padding: 20px;
  min-height: 100vh;
}
.lcars-bar {
  background: #8844aa;
  height: 32px;
  border-radius: 0 16px 16px 0;
  margin: 0 0 20px;
  display: flex; align-items: center;
  width: 55%;
}
.lcars-bar .label {
  color: #000;
  font-size: 1.1rem;
  letter-spacing: 3px;
  padding-left: 24px;
  text-transform: uppercase;
  font-weight: 900;
}
.top-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.top-row .info {
  color: #555;
  font-size: 0.7rem;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.btn {
  padding: 8px 20px;
  font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  border-radius: 0 10px 10px 10px;
  cursor: pointer;
  color: #000;
  transition: opacity 0.15s;
}
.btn:active { opacity: 0.7; }
.btn.browse { background: #4488cc; }
.btn.clear { background: #555; }

.wrapper {
  overflow-x: auto;
  border: 1px solid #1a1a2a;
  border-radius: 0 8px 8px 8px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 0.78rem;
  user-select: text;
  -webkit-user-select: text;
}
th {
  background: #0a0a14;
  color: #8844aa;
  font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid #2a2a4a;
  white-space: nowrap;
  position: sticky;
  top: 0;
}
td {
  padding: 6px 12px;
  border-bottom: 1px solid #0f0f1a;
  color: #aaa;
}
tr:hover td { background: #0a0a14; }
tr:last-child td { border-bottom: none; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal {
  background: #0a0a14; border: 1px solid #2a2a4a;
  border-radius: 0 12px 12px 12px; padding: 20px;
  width: 420px; max-width: 90vw;
}
.modal h3 {
  color: #8844aa; font-size: 0.75rem; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 12px; font-weight: 900;
}
.modal label {
  color: #888; font-size: 0.65rem; text-transform: uppercase;
  letter-spacing: 1px; display: block; margin-bottom: 4px;
}
.modal textarea {
  width: 100%; background: #000; border: 1px solid #2a2a4a;
  color: #ccc; padding: 8px; font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 0.78rem; border-radius: 0 6px 6px 6px; resize: vertical;
  min-height: 80px; margin-bottom: 10px;
}
.modal input {
  width: 100%; background: #000; border: 1px solid #2a2a4a;
  color: #ccc; padding: 8px; font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 0.78rem; border-radius: 0 6px 6px 6px; margin-bottom: 10px;
}
.modal .btn-row {
  display: flex; gap: 8px; justify-content: flex-end;
}

.empty { color: #555; text-align: center; padding: 60px 0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.85rem; }
.error { color: #dd4444; padding: 12px 0; font-family: 'Segoe UI', system-ui, sans-serif; }
.spinner { display: block; width: 28px; height: 28px; border: 3px solid #2a2a4a; border-top-color: #8844aa; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

#status-bar {
  margin-top: 12px;
  color: #555;
  font-size: 0.7rem;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

@media (max-width: 700px) {
  body { padding: 10px; }
  .lcars-bar { width: 90%; }
  .lcars-bar .label { font-size: 0.9rem; padding-left: 16px; }
  th, td { padding: 6px 8px; font-size: 0.7rem; }
}
</style>
</head>
<body>

<div class="lcars-bar"><span class="label">Navigation</span></div>

<div class="top-row">
  <button class="btn browse" onclick="document.getElementById('file-picker').click()">Browse</button>
  <input type="file" accept=".csv" id="file-picker" style="display:none">
  <button class="btn clear" onclick="clearRoute()">Clear</button>
  <button class="btn" id="planner-toggle" onclick="togglePlanner()" style="background:#4488cc;">Plan Route</button>
  <button class="btn" id="compare-toggle" onclick="toggleCompare()" style="background:#8844cc;">Compare</button>
  <span class="info" id="file-info"></span>
</div>

<div id="planner-panel" style="display:none; margin-bottom:16px; border:1px solid #2a2a4a; border-radius:0 10px 10px 10px; padding:16px; background:#0a0a14;">
  <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
    <div>
      <label style="color:#888; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px;">From</label>
      <input id="plan-from" type="text" value="" style="background:#000; border:1px solid #2a2a4a; color:#ccc; padding:8px 12px; font-family:'Segoe UI',system-ui,sans-serif; font-size:0.78rem; border-radius:0 6px 6px 6px; width:200px;">
    </div>
    <div>
      <label style="color:#888; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px;">To</label>
      <input id="plan-to" type="text" value="" style="background:#000; border:1px solid #2a2a4a; color:#ccc; padding:8px 12px; font-family:'Segoe UI',system-ui,sans-serif; font-size:0.78rem; border-radius:0 6px 6px 6px; width:200px;">
    </div>
    <div>
      <label style="color:#888; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px;">Jump Range (LY)</label>
      <input id="plan-range" type="number" value="30" min="1" max="200" step="0.5" style="background:#000; border:1px solid #2a2a4a; color:#ccc; padding:8px 12px; font-family:'Segoe UI',system-ui,sans-serif; font-size:0.78rem; border-radius:0 6px 6px 6px; width:120px;">
    </div>
    <div>
      <label style="color:#888; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px;">Efficiency</label>
      <select id="plan-eff" style="background:#000; border:1px solid #2a2a4a; color:#ccc; padding:8px 12px; font-family:'Segoe UI',system-ui,sans-serif; font-size:0.78rem; border-radius:0 6px 6px 6px; width:100px;">
        <option value="60">60%</option>
        <option value="70">70%</option>
        <option value="80">80%</option>
        <option value="90">90%</option>
        <option value="100">100%</option>
      </select>
    </div>
    <div>
      <button class="btn" id="plan-btn" onclick="plotRoute()" style="background:#8844aa;">Plot Route</button>
    </div>
  </div>
  <div id="plan-status" style="color:#555; font-size:0.7rem; margin-top:10px; font-family:'Segoe UI',system-ui,sans-serif;"></div>
</div>

<div id="compare-panel" style="display:none; margin-bottom:16px; border:1px solid #2a2a4a; border-radius:0 10px 10px 10px; padding:16px; background:#0a0a14;">
  <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
    <div>
      <label style="color:#888; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px;">From</label>
      <input id="cmp-from" type="text" value="" style="background:#000; border:1px solid #2a2a4a; color:#ccc; padding:8px 12px; font-family:'Segoe UI',system-ui,sans-serif; font-size:0.78rem; border-radius:0 6px 6px 6px; width:200px;">
    </div>
    <div>
      <label style="color:#888; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px;">To</label>
      <input id="cmp-to" type="text" value="" style="background:#000; border:1px solid #2a2a4a; color:#ccc; padding:8px 12px; font-family:'Segoe UI',system-ui,sans-serif; font-size:0.78rem; border-radius:0 6px 6px 6px; width:200px;">
    </div>
  </div>
  <div id="cmp-configs" style="margin-top:12px;"></div>
  <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
    <button class="btn" onclick="addConfig()" style="background:#666;">+ Add Config</button>
    <button class="btn" id="cmp-btn" onclick="runCompare()" style="background:#8844cc;">Compare Routes</button>
    <span id="cmp-status" style="color:#555; font-size:0.7rem; font-family:'Segoe UI',system-ui,sans-serif;"></span>
  </div>
  <div id="cmp-results" style="margin-top:12px;"></div>
</div>

<div id="table-container">
  <div class="empty">Click Browse to select a route CSV file, or use Plan Route to plot a course.</div>
</div>

<div id="status-bar"></div>


<script>
const LS_COLS = 'nav_columns';
const LS_ROWS = 'nav_rows';

let columns = [];
let rows = [];
let systemCol = 'System';
let bodyCol = '';
let subtypeCol = '';

function detectBodyCol() {
  const candidates = ['Body Name', 'Body', 'BodyName', 'Landmark', 'Name'];
  for (const c of candidates) {
    if (columns.includes(c)) { bodyCol = c; return; }
    const lower = columns.find(x => x.toLowerCase() === c.toLowerCase());
    if (lower) { bodyCol = lower; return; }
  }
  bodyCol = '';
}

function detectSubtypeCol() {
  const candidates = ['Body Type', 'Subtype', 'Type', 'Landmark Subtype', 'Landmark subtype'];
  for (const c of candidates) {
    if (columns.includes(c)) { subtypeCol = c; return; }
    const lower = columns.find(x => x.toLowerCase() === c.toLowerCase());
    if (lower) { subtypeCol = lower; return; }
  }
  subtypeCol = '';
}

function detectSystemCol() {
  if (columns.includes('System')) { systemCol = 'System'; return; }
  const lower = columns.find(c => c.toLowerCase() === 'system');
  if (lower) { systemCol = lower; return; }
  const star = columns.find(c => {
    const lc = c.toLowerCase();
    return lc === 'star system' || lc === 'system name' || lc === 'sysname';
  });
  if (star) { systemCol = star; return; }
  systemCol = columns[0] || '';
}

function renderTable() {
  const container = document.getElementById('table-container');

  if (!rows.length) {
    container.innerHTML = '<div class="empty">Click Browse to select a route CSV file.</div>';
    document.getElementById('status-bar').textContent = '';
    return;
  }

  const wrapper = container.querySelector('.wrapper');
  const savedScroll = wrapper ? wrapper.scrollTop : 0;

  let html = '<div class="wrapper"><table><thead><tr>';
  html += '<th>' + esc(systemCol) + '</th>';
  html += '<th>' + esc(bodyCol || 'Body') + '</th>';
  if (subtypeCol) html += '<th>' + esc(subtypeCol) + '</th>';
  html += '<th style="width:48px;">Notes</th>';
  html += '</tr></thead><tbody>';

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const sys = row[systemCol] || '';
    html += '<tr>';
    html += '<td>' + esc(sys) + '</td>';
    html += '<td>' + esc(bodyCol ? (row[bodyCol] || '') : '') + '</td>';
    if (subtypeCol) html += '<td>' + esc(row[subtypeCol] || '') + '</td>';
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  container.innerHTML = html;
  const nw = container.querySelector('.wrapper');
  if (nw) nw.scrollTop = savedScroll;

  document.getElementById('status-bar').textContent = rows.length + ' entries';
}

function loadData(newColumns, newRows) {
  columns = newColumns;
  rows = newRows;
  detectSystemCol();
  detectBodyCol();
  detectSubtypeCol();
  renderTable();
}

function clearRoute() {
  columns = [];
  rows = [];
  try {
    localStorage.removeItem(LS_COLS);
    localStorage.removeItem(LS_ROWS);
  } catch (_) {}
  fetch('api/upload', { method: 'DELETE' }).catch(function(){});
  renderTable();
  document.getElementById('file-info').textContent = '';
}

async function loadRoute() {
  const params = new URLSearchParams(window.location.search);
  const path = params.get('path');
  if (!path) return;

  document.getElementById('table-container').innerHTML = '<span class="spinner"></span>';

  const r = await fetch('api/route?path=' + encodeURIComponent(path));
  const res = await r.json();

  if (!res.ok) {
    document.getElementById('table-container').innerHTML = '<div class="error">' + esc(res.error) + '</div>';
    return;
  }

  document.getElementById('file-info').textContent = res.file + ' — ' + res.total + ' entries';
  loadData(res.columns, res.rows);
}

/* --- Route Planner --- */
function togglePlanner() {
  const panel = document.getElementById('planner-panel');
  const btn = document.getElementById('planner-toggle');
  const isHidden = panel.style.display === 'none' || !panel.style.display;
  panel.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? 'Close Planner' : 'Plan Route';
  if (isHidden) document.getElementById('plan-status').textContent = '';
}

async function plotRoute() {
  const from = document.getElementById('plan-from').value.trim();
  const to = document.getElementById('plan-to').value.trim();
  const range = parseFloat(document.getElementById('plan-range').value);
  const eff = parseInt(document.getElementById('plan-eff').value);

  if (!from || !to) {
    document.getElementById('plan-status').textContent = 'Please enter both From and To systems.';
    return;
  }
  if (!range || range < 1) {
    document.getElementById('plan-status').textContent = 'Jump range must be at least 1 LY.';
    return;
  }

  const statusEl = document.getElementById('plan-status');
  const btn = document.getElementById('plan-btn');
  statusEl.textContent = 'Contacting Spansh route planner...';
  btn.disabled = true;
  btn.style.opacity = '0.5';

  try {
    const body = new URLSearchParams();
    body.append('from_system', from);
    body.append('to_system', to);
    body.append('jump_range', String(range));
    body.append('efficiency', String(eff));

    const r = await fetch('api/route/plan', { method: 'POST', body });
    const res = await r.json();

    if (!res.ok) {
      statusEl.textContent = 'Error: ' + res.error;
      return;
    }

    document.getElementById('file-info').textContent = res.file + ' — ' + res.total + ' entries';
    loadData(res.columns, res.rows);
    statusEl.textContent = 'Route planned successfully — ' + res.total + ' jumps';
  } catch (err) {
    statusEl.textContent = 'Error: ' + err;
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

/* --- Compare --- */
let cmpConfigs = [];
let cmpCounter = 0;
let _compareResults = [];
function escJs(s) {
  return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}


function toggleCompare() {
  const panel = document.getElementById('compare-panel');
  const btn = document.getElementById('compare-toggle');
  const isHidden = panel.style.display === 'none' || !panel.style.display;
  panel.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? 'Close Compare' : 'Compare';
}

function addConfig(range, efficiency, label) {
  range = range || 30;
  efficiency = efficiency || 60;
  label = label || 'Config ' + (++cmpCounter);
  cmpConfigs.push({ label: label, range: range, efficiency: efficiency });
  renderConfigs();
}

function removeConfig(idx) {
  cmpConfigs.splice(idx, 1);
  renderConfigs();
}

function renderConfigs() {
  const el = document.getElementById('cmp-configs');
  if (!cmpConfigs.length) {
    el.innerHTML = '<div style="color:#555;font-size:0.7rem;font-family:\'Segoe UI\',system-ui,sans-serif;">Add at least one configuration to compare.</div>';
    return;
  }
  let html = '<table style="width:100%;border-collapse:collapse;font-family:\'Segoe UI\',system-ui,sans-serif;font-size:0.78rem;">';
  html += '<thead><tr>';
  html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid #2a2a4a;">Label</th>';
  html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid #2a2a4a;">Range (LY)</th>';
  html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid #2a2a4a;">Efficiency</th>';
  html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid #2a2a4a;"></th>';
  html += '</tr></thead><tbody>';
  for (let i = 0; i < cmpConfigs.length; i++) {
    const c = cmpConfigs[i];
    html += '<tr>';
    html += '<td style="padding:4px 10px;border-bottom:1px solid #0f0f1a;"><input type="text" value="' + esc(c.label) + '" onchange="cmpConfigs[' + i + '].label=this.value" style="background:#000;border:1px solid #2a2a4a;color:#ccc;padding:4px 8px;font-family:\'Segoe UI\',system-ui,sans-serif;font-size:0.78rem;border-radius:0 4px 4px 4px;width:120px;"></td>';
    html += '<td style="padding:4px 10px;border-bottom:1px solid #0f0f1a;"><input type="number" value="' + c.range + '" min="1" step="0.5" onchange="cmpConfigs[' + i + '].range=parseFloat(this.value)||30" style="background:#000;border:1px solid #2a2a4a;color:#ccc;padding:4px 8px;font-family:\'Segoe UI\',system-ui,sans-serif;font-size:0.78rem;border-radius:0 4px 4px 4px;width:80px;"></td>';
    html += '<td style="padding:4px 10px;border-bottom:1px solid #0f0f1a;"><select onchange="cmpConfigs[' + i + '].efficiency=parseInt(this.value)" style="background:#000;border:1px solid #2a2a4a;color:#ccc;padding:4px 8px;font-family:\'Segoe UI\',system-ui,sans-serif;font-size:0.78rem;border-radius:0 4px 4px 4px;width:80px;">';
    for (const v of [60, 70, 80, 90, 100]) {
      html += '<option value="' + v + '"' + (v === c.efficiency ? ' selected' : '') + '>' + v + '%</option>';
    }
    html += '</select></td>';
    html += '<td style="padding:4px 10px;border-bottom:1px solid #0f0f1a;"><button onclick="removeConfig(' + i + ')" style="background:#aa3333;border:none;color:#fff;padding:2px 10px;border-radius:0 4px 4px 4px;cursor:pointer;font-family:\'Swiss 911\',\'Arial Black\',Impact,system-ui,sans-serif;font-size:0.6rem;">Remove</button></td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

async function runCompare() {
  const from = document.getElementById('cmp-from').value.trim();
  const to = document.getElementById('cmp-to').value.trim();
  if (!from || !to) {
    document.getElementById('cmp-status').textContent = 'Enter From and To systems.';
    return;
  }
  if (!cmpConfigs.length) {
    document.getElementById('cmp-status').textContent = 'Add at least one config.';
    return;
  }

  const statusEl = document.getElementById('cmp-status');
  const btn = document.getElementById('cmp-btn');
  const resultsEl = document.getElementById('cmp-results');
  statusEl.textContent = 'Planning ' + cmpConfigs.length + ' routes in parallel...';
  btn.disabled = true;
  btn.style.opacity = '0.5';
  resultsEl.innerHTML = '';

  try {
    const body = new URLSearchParams();
    body.append('from_system', from);
    body.append('to_system', to);
    body.append('configs', JSON.stringify(cmpConfigs));

    const r = await fetch('api/route/compare', { method: 'POST', body });
    const res = await r.json();

    if (!res.ok) {
      statusEl.textContent = 'Error: ' + res.error;
      return;
    }

    let html = '<div style="margin-top:8px;">';
    if (res.cached) {
      html += '<div style="color:#888;font-size:0.65rem;font-family:\'Segoe UI\',system-ui,sans-serif;margin-bottom:6px;">(cached result)</div>';
    }

    _compareResults = res.results;

    // Summary table
    html += '<table style="width:100%;border-collapse:collapse;font-family:\'Segoe UI\',system-ui,sans-serif;font-size:0.78rem;">';
    html += '<thead><tr>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid #2a2a4a;">Label</th>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid #2a2a4a;">Range</th>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid #2a2a4a;">Eff.</th>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid #2a2a4a;">Jumps</th>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid #2a2a4a;">Total LY</th>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid #2a2a4a;">Neutrons</th>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid #2a2a4a;">Avg Jump</th>';
    html += '<th style="background:#0a0a14;color:#8844aa;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid #2a2a4a;"></th>';
    html += '</tr></thead><tbody>';

    for (let ri = 0; ri < res.results.length; ri++) {
      const r = res.results[ri];
      html += '<tr style="cursor:pointer;" data-ridx="' + ri + '" onclick="loadCompareRoute(this)">';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;color:#8844aa;">' + esc(r.label || '') + '</td>';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;text-align:right;">' + r.range + ' LY</td>';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;text-align:right;">' + r.efficiency + '%</td>';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;text-align:right;color:#eee;font-weight:bold;">' + r.jumps + '</td>';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;text-align:right;">' + r.total_distance_ly + '</td>';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;text-align:right;">' + r.neutron_jumps + '</td>';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;text-align:right;">' + r.avg_jump_ly + ' LY</td>';
      html += '<td style="padding:8px 10px;border-bottom:1px solid #0f0f1a;"><span style="color:#888;font-size:0.65rem;">load</span></td>';
      html += '</tr>';
    }
    html += '</tbody></table>';

    // Errors
    if (res.errors && res.errors.length) {
      html += '<div style="margin-top:8px;">';
      for (const e of res.errors) {
        html += '<div style="color:#dd4444;font-size:0.7rem;font-family:\'Segoe UI\',system-ui,sans-serif;">' + esc(e.label) + ': ' + esc(e.error) + '</div>';
      }
      html += '</div>';
    }

    html += '</div>';
    resultsEl.innerHTML = html;
    statusEl.textContent = 'Compared ' + res.results.length + ' routes' + (res.cached ? ' (cached)' : '');
  } catch (err) {
    statusEl.textContent = 'Error: ' + err;
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

function loadCompareRoute(el) {
  const idx = parseInt(el.dataset.ridx);
  const r = _compareResults[idx];
  if (!r) return;
  loadData(r.columns, r.rows);
  document.getElementById('file-info').textContent = r.label + ' — ' + r.jumps + ' jumps';
  toggleCompare();
}

(async function init() {
  /* Auto-fill current system into planner From field */
  try {
    const r = await fetch('api/system');
    const res = await r.json();
    if (res.ok && res.system) {
      document.getElementById('plan-from').value = res.system;
    }
  } catch (_) {}

  try {
    const r = await fetch('api/cached');
    const res = await r.json();
    if (res.ok && res.cached && res.rows.length) {
      document.getElementById('file-info').textContent = res.file + ' — ' + res.total + ' entries';
      loadData(res.columns, res.rows);
      return;
    }
  } catch (_) {}

  try {
    const c = localStorage.getItem(LS_COLS);
    const r = localStorage.getItem(LS_ROWS);
    if (c && r) {
      columns = JSON.parse(c);
      rows = JSON.parse(r);
      detectSystemCol();
      detectBodyCol();
      detectSubtypeCol();
      renderTable();
    }
  } catch (_) {}

  const params = new URLSearchParams(window.location.search);
  if (params.get('path')) loadRoute();
})();

document.getElementById('file-picker').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;

  document.getElementById('file-info').textContent = file.name + ' (' + file.size + ' bytes)';
  document.getElementById('table-container').innerHTML = '<span class="spinner"></span>';

  const formData = new FormData();
  formData.append('file', file);

  fetch('api/upload', { method: 'POST', body: formData })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.ok) {
        document.getElementById('table-container').innerHTML = '<div class="error">' + esc(res.error) + '</div>';
        return;
      }
      document.getElementById('file-info').textContent = res.file + ' — ' + res.total + ' entries';
      loadData(res.columns, res.rows);
      try {
        localStorage.setItem(LS_COLS, JSON.stringify(res.columns));
        localStorage.setItem(LS_ROWS, JSON.stringify(res.rows));
      } catch (_) {}
    })
    .catch(function(err) {
      document.getElementById('table-container').innerHTML = '<div class="error">' + esc(err) + '</div>';
    });

  this.value = '';
});
</script>
