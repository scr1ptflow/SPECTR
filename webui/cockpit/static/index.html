<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTR</title>
<link rel="stylesheet" href="/static/lcars.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #000;
    color: #ccc;
    font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
    display: flex;
  }

  .sidebar {
    width: 200px;
    min-width: 200px;
    background: #080810;
    border-right: 1px solid #15152a;
    display: flex;
    flex-direction: column;
    padding-top: 0;
    position: relative;
  }

  .sidebar .brand {
    color: #ff9900;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-align: center;
    padding: 24px 12px 8px;
    position: relative;
  }
  .sidebar .brand::after {
    content: 'command interface';
    display: block;
    color: #555;
    font-size: 0.55rem;
    letter-spacing: 3px;
    font-weight: 400;
    margin-top: 2px;
  }

  .sidebar .top-elbow {
    padding: 12px 16px 4px;
  }
  .sidebar .top-elbow .elbow-row {
    display: flex;
    align-items: flex-end;
    height: 24px;
  }
  .sidebar .top-elbow .elbow-row .bar {
    height: 8px;
    background: #ff9900;
    border-radius: 0 4px 4px 0;
  }
  .sidebar .top-elbow .elbow-row .bar.w1 { width: 40px; }
  .sidebar .top-elbow .elbow-row .bar.w2 { width: 80px; margin-top: 4px; opacity: 0.5; }
  .sidebar .top-elbow .elbow-row .corner {
    width: 24px; height: 24px;
    border-right: 8px solid #ff9900;
    border-bottom: 8px solid #ff9900;
    border-radius: 0 0 4px 0;
    flex-shrink: 0;
  }

  .sidebar .nav-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px 0;
  }

  .tab {
    position: relative;
    display: flex;
    align-items: center;
    padding: 13px 20px 13px 16px;
    cursor: pointer;
    color: #555;
    font-size: 0.82rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
    font-weight: 700;
    border-left: 3px solid transparent;
  }
  .tab::before {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 0;
    background: var(--tab-color, #ff9900);
    border-radius: 2px 0 0 2px;
    transition: height 0.2s;
  }
  .tab:hover {
    color: #999;
    background: rgba(255,255,255,0.02);
    border-left-color: rgba(255,153,0,0.3);
  }
  .tab:hover::before { height: 60%; }
  .tab.active {
    color: #ff9900;
    border-left-color: #ff9900;
    background: linear-gradient(90deg, rgba(255,153,0,0.06), transparent);
  }
  .tab.active::before {
    height: 70%;
    background: #ff9900;
    box-shadow: 0 0 8px rgba(255,153,0,0.5);
  }

  .tab .tab-indicator {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tab.active .tab-indicator {
    opacity: 1;
    background: #ff9900;
    box-shadow: 0 0 6px rgba(255,153,0,0.6);
  }

  .sidebar .bottom-bar {
    padding: 12px 16px;
    border-top: 1px solid #15152a;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .sidebar .bottom-bar .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2a2a4a;
  }
  .sidebar .bottom-bar .dot.active { background: #44aa66; box-shadow: 0 0 6px rgba(68,170,102,0.5); }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .tool-panel {
    display: none;
    flex: 1;
    flex-direction: column;
    padding: 20px;
    overflow: auto;
  }
  .tool-panel.active { display: flex; }
  .tool-panel iframe {
    width: 100%;
    flex: 1;
    border: none;
    background: #000;
  }

  @media (max-width: 700px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 0;
      flex-direction: row;
      overflow-x: auto;
      border-right: none;
      border-bottom: 1px solid #15152a;
      order: 1;
      padding-top: 0;
    }
    .sidebar .brand {
      display: none;
    }
    .sidebar .top-elbow { display: none; }
    .sidebar .nav-section {
      flex-direction: row;
      padding: 0;
    }
    .sidebar .bottom-bar { display: none; }
    .tab {
      padding: 12px 14px;
      font-size: 0.65rem;
      letter-spacing: 1px;
      white-space: nowrap;
      border-left: none;
      border-top: 3px solid transparent;
    }
    .tab::before { display: none; }
    .tab.active { border-left: none; border-top-color: #ff9900; }
    .tab .tab-indicator { display: none; }
    .tool-panel { padding: 8px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="top-elbow">
    <div class="elbow-row">
      <div class="bar w1"></div>
      <div class="corner"></div>
    </div>
    <div class="elbow-row" style="justify-content:flex-end">
      <div class="bar w2"></div>
    </div>
  </div>

  <div class="brand">SPECTR</div>

  <div class="nav-section">
    <div class="tab active" data-tool="system-map" style="--tab-color:#3366cc">System Map<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="ship" style="--tab-color:#00bbcc">Ship<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="missions" style="--tab-color:#ff9900">Missions<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="lrs" style="--tab-color:#55bb88">LRS<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="route" style="--tab-color:#8844aa">Navigation<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="blackbox" style="--tab-color:#cc3300">Flight Recorder<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="captains-log" style="--tab-color:#ffcc00">Captains Log<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="engineering" style="--tab-color:#44aacc">Engineering<span class="tab-indicator"></span></div>
    <div class="tab" data-tool="laboratory" style="--tab-color:#88cc44">Laboratory<span class="tab-indicator"></span></div>
  </div>

  <div class="bottom-bar">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="main">

  <div class="tool-panel active" id="panel-system-map">
    <iframe src="/system-map/"></iframe>
  </div>

  <div class="tool-panel" id="panel-ship">
    <iframe src="/ship/"></iframe>
  </div>

  <div class="tool-panel" id="panel-missions">
    <iframe src="/missions/"></iframe>
  </div>

  <div class="tool-panel" id="panel-lrs">
    <iframe src="/lrs/"></iframe>
  </div>

  <div class="tool-panel" id="panel-route">
    <iframe src="/navigation/"></iframe>
  </div>

  <div class="tool-panel" id="panel-blackbox">
    <iframe src="/blackbox/"></iframe>
  </div>

  <div class="tool-panel" id="panel-captains-log">
    <iframe src="/captains-log/"></iframe>
  </div>

  <div class="tool-panel" id="panel-engineering">
    <iframe src="/engineering/"></iframe>
  </div>

  <div class="tool-panel" id="panel-laboratory">
    <iframe src="/laboratory/"></iframe>
  </div>

</div>

<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const panel = document.getElementById('panel-' + tab.dataset.tool);
    if (panel) panel.classList.add('active');
  });
});
</script>
</body>
</html>
