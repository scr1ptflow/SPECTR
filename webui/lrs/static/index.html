<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTR LRS</title>
<script src="/static/shared.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ccc;
    font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
    padding: 20px;
    min-height: 100vh;
  }
  .lcars-bar {
    background: #55bb88;
    height: 32px;
    border-radius: 0 16px 16px 0;
    margin: 0 0 24px;
    display: flex; align-items: center;
    width: 60%;
  }
  .lcars-bar .label {
    color: #000;
    font-size: 1.1rem;
    letter-spacing: 3px;
    padding-left: 24px;
    text-transform: uppercase;
    font-weight: 900;
  }
  .card {
    background: #0a0a1a;
    border: 2px solid #2a2a4a;
    border-radius: 0 20px 20px 20px;
    padding: 18px 22px;
    margin-bottom: 16px;
  }
  .card h2 {
    color: #55bb88;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card .value {
    color: #fff;
    font-size: 1.6rem;
    font-weight: 700;
  }
  .btn {
    display: block;
    width: fit-content;
    margin: 0 auto;
    padding: 12px 40px;
    font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
    font-size: 0.9rem;
    font-weight: 900;
    letter-spacing: 2px;
    border: none;
    border-radius: 0 14px 14px 14px;
    cursor: pointer;
    color: #000;
    text-align: center;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn.primary { background: #00bbcc; }
  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a2e;
  }
  .result-item:last-child { border: none; }
  .result-item .name { font-size: 0.85rem; font-family: 'Segoe UI', system-ui, sans-serif; }
  .result-item .meta { color: #888; font-size: 0.75rem; font-family: 'Segoe UI', system-ui, sans-serif; }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    font-size: 0.65rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 0 8px 8px 8px;
  }
  .badge.planetary { background: #00bbcc; color: #000; }
  .badge.station   { background: #ff9900; color: #000; }
  .badge.carrier   { background: #8844aa; color: #fff; }
  .error { color: #dd4444; padding: 12px 0; font-family: 'Segoe UI', system-ui, sans-serif; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #2a2a4a; border-top-color: #55bb88; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) {
    body { padding: 10px; }
    .lcars-bar { width: 90%; }
    .lcars-bar .label { font-size: 0.9rem; padding-left: 16px; }
    .card { padding: 12px 14px; }
    .card .value { font-size: 1.2rem; }
    .btn { width: 100%; padding: 10px 20px; font-size: 0.8rem; }
    .result-item { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>
<div class="lcars-bar"><span class="label">Long Range Scanner</span></div>

<button class="btn primary" onclick="runLrs()">Scan Nearby</button>

<div style="margin-top:16px">
  <div class="card" id="system-card" style="display:none;">
    <h2>Current System</h2>
    <div class="value" id="system-display">—</div>
  </div>

  <div class="card" id="results-card" style="display:none;">
    <h2>Nearby Services</h2>
    <div id="results"></div>
  </div>

  <div class="card" id="error-card" style="display:none;">
    <div class="error" id="error-text"></div>
  </div>
</div>

<script>
let shipSize = 'L';

async function runLrs() {
  const sysCard = document.getElementById('system-card');
  const sysDisplay = document.getElementById('system-display');
  const resultsEl = document.getElementById('results');
  const cardEl = document.getElementById('results-card');
  const errCard = document.getElementById('error-card');
  const errText = document.getElementById('error-text');
  errCard.style.display = 'none';
  cardEl.style.display = 'none';
  resultsEl.innerHTML = '<span class="spinner"></span> Scanning...';
  cardEl.style.display = 'block';

  try {
    const [sysRes, lrsRes] = await Promise.all([
      fetch('api/system'),
      fetch(`api/check?radius=100&ship_size=${shipSize}`)
    ]);
    const sys = await sysRes.json();
    const d = await lrsRes.json();

    if (sys.ok) {
      sysDisplay.textContent = sys.system;
      sysCard.style.display = 'block';
    }

    if (!d.ok) {
      errText.textContent = d.error;
      errCard.style.display = 'block';
      resultsEl.innerHTML = '';
      return;
    }
    if (!d.results || d.results.length === 0) {
      resultsEl.innerHTML = '<div style="color:#888;padding:12px 0;">Nothing found within range</div>';
      return;
    }
    resultsEl.innerHTML = d.results.map(r => `
      <div class="result-item">
        <div>
          <div class="name">${esc(r.station)}</div>
          <div class="meta">${esc(r.system)} &middot; ${esc(r.distance_ly)} LY &middot; ${esc(r.distance_to_arrival_ls)} Ls</div>
        </div>
        <div><span class="badge ${esc(r.category)}">${esc(r.category)}</span></div>
      </div>
    `).join('');
  } catch(e) {
    errText.textContent = 'Connection error';
    errCard.style.display = 'block';
    resultsEl.innerHTML = '';
  }
}
</script>
</body>
</html>
