<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTR Missions</title>
<script src="/static/shared.js"></script>
<link rel="stylesheet" href="/static/lcars.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ccc;
    font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
    padding: 20px;
    min-height: 100vh;
  }
  .lcars-bar {
    background: #ff9900;
    height: 32px;
    border-radius: 0 16px 16px 0;
    margin: 0 0 24px;
    display: flex; align-items: center;
    width: 60%;
  }
  .lcars-bar .label {
    color: #000;
    font-size: 1.1rem;
    letter-spacing: 3px;
    padding-left: 24px;
    text-transform: uppercase;
    font-weight: 900;
  }
  .section-title {
    color: #000;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 900;
    padding: 6px 16px;
    margin-bottom: 8px;
    border-radius: 0 12px 12px 0;
    width: fit-content;
    min-width: 140px;
  }
  .section-title.active { background: #00bbcc; }
  .section-title.failed { background: #dd4444; }
  .section-title.complete { background: #44aa66; }
  .mission {
    background: #0a0a1a;
    border: 1px solid #2a2a4a;
    border-radius: 0 14px 14px 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .mission .header {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
  }
  .mission .name {
    flex: 1; font-size: 0.85rem; color: #fff; font-weight: 600;
  }
  .badge {
    display: inline-block;
    font-size: 0.55rem;
    padding: 2px 8px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 0 6px 6px 6px;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: 'Swiss 911', 'Arial Black', system-ui, sans-serif;
  }
  .badge-active { background: #00bbcc; color: #000; }
  .badge-failed { background: #dd4444; color: #000; }
  .badge-complete { background: #44aa66; color: #000; }
  .progress-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
  }
  .progress-label {
    font-size: 0.8rem; color: #888; white-space: nowrap; min-width: 60px;
  }
  .bar-track {
    flex: 1; height: 10px; background: #1a1a2e;
    border-radius: 0 5px 5px 5px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 0 5px 5px 5px;
    transition: width 0.3s;
  }
  .bar-kill { background: #dd4444; }
  .bar-deliver { background: #ff9900; }
  .bar-passenger { background: #00bbcc; }
  .bar-mine { background: #cc8844; }
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 16px; font-size: 0.7rem; color: #888; margin-top: 6px;
  }
  .meta-row .label { color: #555; }
  .meta-row .val { color: #ccc; }
  .expiry-warn { color: #ff9900; }
  .expiry-critical { color: #dd4444; }
  .reward { color: #00bbcc; font-weight: 700; }
  .empty { color: #666; padding: 8px 0; }
  .error { color: #dd4444; padding: 12px 0; }
  .spinner { display: block; width: 28px; height: 28px; border: 3px solid #2a2a4a; border-top-color: #ff9900; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  hr { border: none; border-top: 1px solid #1a1a2e; margin: 20px 0; }
  @media (max-width: 700px) {
    body { padding: 10px; }
    .lcars-bar { width: 90%; }
    .lcars-bar .label { font-size: 0.9rem; padding-left: 16px; }
    .mission { padding: 10px 12px; }
    .mission .name { font-size: 0.75rem; }
    .meta-row { gap: 8px; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<div class="lcars-bar"><span class="label">Missions</span></div>
<div id="content"></div>

<script>
async function load() {
  const el = document.getElementById('content');
  if (!el.childNodes.length) el.innerHTML = '<span class="spinner"></span>';
  const r = await fetch('api/missions');
  const d = await r.json();
  if (!d.ok) { el.innerHTML = `<div class="error">${d.error}</div>`; return; }

  let html = '';

  const sections = [
    { key: 'active', label: 'Active', badgeClass: 'badge-active', secClass: 'active' },
    { key: 'failed', label: 'Failed', badgeClass: 'badge-failed', secClass: 'failed' },
    { key: 'complete', label: 'Complete', badgeClass: 'badge-complete', secClass: 'complete' },
  ];

  for (const sec of sections) {
    const items = d[sec.key];
    html += `<div class="section-title ${sec.secClass}">${sec.label} (${items.length})</div>`;
    if (!items.length) {
      html += `<div class="empty">No ${sec.label.toLowerCase()} missions</div>`;
      continue;
    }
    for (const m of items) {
      html += '<div class="mission">';
      html += `<div class="header"><span class="badge ${sec.badgeClass}">${sec.label}</span><span class="name">${esc(m.name)}</span></div>`;

      // progress bar
      const p = m.progress;
      if (p && p.target) {
        const pct = Math.min(100, (p.current / p.target * 100));
        let barClass = 'bar-kill';
        const t = (p.type || '').toLowerCase();
        if (t.includes('deliver')) barClass = 'bar-deliver';
        else if (t.includes('passenger')) barClass = 'bar-passenger';
        else if (t.includes('mine')) barClass = 'bar-mine';
        html += `<div class="progress-row">`;
        html += `<span class="progress-label">${p.current} / ${p.target}</span>`;
        html += `<div class="bar-track"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>`;
        html += `<span style="font-size:0.75rem;color:#888;min-width:50px;text-align:right">${p.type}</span>`;
        html += `</div>`;
      }

      // meta info
      html += '<div class="meta-row">';
      if (m.destination_system) {
        html += `<span><span class="label">System</span> <span class="val">${esc(m.destination_system)}${m.destination_station ? ' / ' + esc(m.destination_station) : ''}</span></span>`;
      }
      if (m.remaining !== null && m.remaining !== undefined) {
        let cls = '';
        if (m.remaining < 3600) cls = 'expiry-critical';
        else if (m.remaining < 86400) cls = 'expiry-warn';
        html += `<span><span class="label">Expires</span> <span class="val${cls ? ' ' + cls : ''}">${fmtTime(m.remaining)}</span></span>`;
      }
      if (m.reward) {
        html += `<span><span class="label">Reward</span> <span class="val reward">${Number(m.reward).toLocaleString()} CR</span></span>`;
      }
      html += '</div>';

      html += '</div>';
    }
    if (sec.key !== sections[sections.length-1].key) html += '<hr>';
  }

  el.innerHTML = html;
}

function fmtTime(sec) {
  if (sec <= 0) return 'Expired';
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

load();
setInterval(load, 1000);
</script>
</body>
</html>
