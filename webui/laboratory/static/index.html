<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTR — Laboratory</title>
<script src="/static/shared.js"></script>
<link rel="stylesheet" href="/static/lcars.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ccc;
    font-family: 'Swiss 911', 'Arial Black', 'Impact', system-ui, sans-serif;
    padding: 20px;
    min-height: 100vh;
  }
  .lcars-bar {
    background: #88cc44;
    height: 32px;
    border-radius: 0 16px 16px 0;
    margin: 0 0 20px;
    display: flex; align-items: center;
    width: 60%;
  }
  .lcars-bar .label {
    color: #000;
    font-size: 1.1rem;
    letter-spacing: 3px;
    padding-left: 24px;
    text-transform: uppercase;
    font-weight: 900;
  }
  .summary-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: #0a0a14;
    border-left: 4px solid #88cc44;
    border-radius: 0 8px 8px 8px;
    padding: 12px 20px;
    min-width: 140px;
  }
  .stat-box .label {
    color: #555;
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-box .value {
    color: #fff;
    font-size: 1.2rem;
    font-weight: 700;
  }
  .stat-box .value.green { color: #88cc44; }
  .q25 { flex: 0 0 calc(25% - 16px); min-width: 140px; }
  .q25.right { text-align: right; }
  .spacer { visibility: hidden; }
  .genus-group { margin-bottom: 20px; }
  .genus-header {
    color: #88cc44;
    font-size: 0.9rem;
    letter-spacing: 2px;
    padding: 8px 12px;
    border-bottom: 1px solid #88cc4420;
    margin-bottom: 8px;
    display: flex; gap: 16px; align-items: baseline;
  }
  .genus-header .sub {
    color: #555;
    font-size: 0.65rem;
    letter-spacing: 0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.78rem;
  }
  th {
    text-align: left;
    color: #555;
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 12px;
    border-bottom: 1px solid #1a1a2a;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid #0f0f1a;
    color: #aaa;
  }
  td:last-child, th:last-child { text-align: right; }
  .body-name { color: #ddd; }
  .system-name { color: #888; font-size: 0.7rem; }
  .count-cell { color: #ddd; font-weight: 600; }
  .value-cell { color: #88cc44; font-weight: 600; }
  .value-cell.none { color: #555; font-weight: 400; }
  .total-row td {
    border-top: 2px solid #88cc44;
    font-weight: 700;
    color: #fff;
  }
  .spinner { display: block; width: 28px; height: 28px; border: 3px solid #2a2a4a; border-top-color: #88cc44; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { color: #555; text-align: center; padding: 40px 20px; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.9rem; }
  .error { color: #dd4444; text-align: center; padding: 40px; font-family: 'Segoe UI', system-ui, sans-serif; }
  .count { color: #555; font-size: 0.7rem; margin-bottom: 12px; font-family: 'Segoe UI', system-ui, sans-serif; }
  @media (max-width: 700px) {
    body { padding: 10px; }
    .lcars-bar { width: 90%; }
    table { font-size: 0.7rem; }
    th, td { padding: 4px 8px; }
    .stat-box { min-width: 100px; padding: 10px 14px; }
    .stat-box .value { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="lcars-bar"><span class="label">Laboratory</span></div>

<div class="summary-row" id="summary"></div>
<div class="count" id="sample-count"></div>
<div id="content"><div class="spinner"></div></div>

<script>
function fmtCR(n) {
  if (n == null || n === 0) return null;
  return n.toLocaleString('en-US') + ' Cr';
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function load() {
  const r = await fetch('api/laboratory');
  const res = await r.json();
  const el = document.getElementById('content');
  const summaryEl = document.getElementById('summary');
  const countEl = document.getElementById('sample-count');

  if (!res.ok) {
    el.innerHTML = `<div class="error">${esc(res.error)}</div>`;
    return;
  }

  const samples = res.samples || [];

  summaryEl.innerHTML = `
    <div class="stat-box q25"><div class="label">Samples</div><div class="value">${res.total_count || 0}</div></div>
    <div class="stat-box q25"><div class="label">Unique Types</div><div class="value">${samples.length}</div></div>
    <div class="stat-box q25 spacer"></div>
    <div class="stat-box q25 right"><div class="label">Total Value</div><div class="value green">${fmtCR(res.total_value) || '0 Cr'}</div></div>
  `;

  countEl.textContent = `${samples.length} species in inventory`;

  if (!samples.length) {
    el.innerHTML = '<div class="empty">No unsold organic samples found</div>';
    return;
  }

  const byGenus = {};
  for (const s of samples) {
    const g = s.genus || 'Unknown';
    if (!byGenus[g]) byGenus[g] = { genus: g, items: [], total_value: 0, total_count: 0 };
    byGenus[g].items.push(s);
    byGenus[g].total_count += s.count;
    if (s.total_value) byGenus[g].total_value += s.total_value;
  }

  let html = '';
  for (const group of Object.values(byGenus)) {
    html += `<div class="genus-group">`;
    html += `<div class="genus-header">${esc(group.genus)} <span class="sub">${group.items.length} species, ${group.total_count} samples, ${fmtCR(group.total_value) || '0 Cr'}</span></div>`;
    html += `<table><thead><tr><th>Species</th><th>Body / System</th><th>Samples</th><th>Value</th></tr></thead><tbody>`;
    for (const s of group.items) {
      const valStr = s.total_value ? fmtCR(s.total_value) : (s.value_per_set ? fmtCR(s.value_per_set) + '/set' : '—');
      html += `<tr>
        <td>${esc(s.species)}</td>
        <td><span class="body-name">${esc(s.body)}</span> <span class="system-name">(${esc(s.system)})</span></td>
        <td class="count-cell">${s.count || 0}</td>
        <td class="value-cell${s.total_value ? '' : ' none'}">${valStr}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  el.innerHTML = html;
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
